<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>قاعدة معرفة المركزية</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F5F3EE;font-family:"Segoe UI",Tahoma,sans-serif;color:#1A1A1A;direction:rtl;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#C5B99A;border-radius:3px}
.hdr{background:linear-gradient(135deg,#1B3A1B,#2E6B2E);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.hdr-left{display:flex;flex-direction:column}
.hdr-title{color:#fff;font-weight:700;font-size:18px}
.hdr-sub{color:rgba(255,255,255,.5);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.hdr-count{background:rgba(255,255,255,.15);color:#fff;font-size:12px;padding:4px 12px;border-radius:20px;font-weight:600}
.search-bar{background:#fff;padding:14px 24px;border-bottom:1.5px solid #E5E0D8;display:flex;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:70px;z-index:99}
.search-wrap{position:relative;flex:1;min-width:220px}
.search-input{width:100%;padding:10px 14px 10px 40px;border-radius:10px;border:1.5px solid #E0DDD8;font-size:14px;background:#F9F7F4;direction:rtl}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:#AAA;pointer-events:none}
.search-input:focus{outline:none;border-color:#2E6B2E;background:#fff}
.clear-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#AAA;display:none}
.result-count{font-size:12px;color:#888;white-space:nowrap;font-weight:600}
.cats{display:flex;gap:6px;flex-wrap:wrap;padding:12px 24px;background:#fff;border-bottom:1.5px solid #E5E0D8}
.cat-btn{padding:5px 13px;border-radius:20px;border:1.5px solid #DDD8D0;background:#fff;color:#888;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;transition:all .15s}
.cat-btn.active{background:#2E6B2E;color:#fff;border-color:#2E6B2E}
.cat-btn:hover:not(.active){border-color:#2E6B2E;color:#2E6B2E}
.body{padding:18px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:#fff;border-radius:13px;border:1.5px solid #E5E0D8;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.card-top{padding:13px 15px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-name{font-weight:700;font-size:15px;color:#1B3A1B;line-height:1.3;flex:1}
.price-badge{background:#1B5E20;color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.price-badge.empty{background:#FFF3E0;color:#E65100}
.cat-tag{display:inline-block;padding:2px 9px;border-radius:6px;font-size:10px;font-weight:700;margin-bottom:6px}
.card-body{padding:0 15px 13px;display:flex;flex-direction:column;gap:8px}
.section{background:#F9F7F4;border-radius:8px;padding:8px 11px}
.section-label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.section-text{font-size:12px;color:#333;line-height:1.6}
.kg-section{background:#FFF3E0;border:1px solid #FFCC80;border-radius:8px;padding:8px 11px;display:flex;gap:10px}
.kg-box{flex:1;text-align:center}
.kg-lbl{font-size:10px;color:#E65100;font-weight:700;margin-bottom:3px}
.kg-val{font-size:13px;font-weight:700;color:#5D4037}
.kg-val.empty{color:#BCA398;font-style:italic;font-size:11px}
.upsell-section{background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:8px 11px}
.upsell-label{font-size:10px;font-weight:700;color:#F57F17;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.upsell-text{font-size:12px;color:#5D4037;line-height:1.5;font-weight:500}
.highlight{background:#FFF176;border-radius:3px;padding:0 2px}
.empty{text-align:center;padding:70px 20px;grid-column:1/-1}
.empty-i{font-size:48px;opacity:.15;margin-bottom:12px}
.empty-t{color:#AAA;font-size:15px}
.c-0{background:#E8F5E9;color:#1B5E20}
.c-1{background:#FBE9E7;color:#BF360C}
.c-2{background:#E3F2FD;color:#0D47A1}
.c-3{background:#F3E5F5;color:#4A148C}
.c-4{background:#FFF8E1;color:#F57F17}
.c-5{background:#E0F7FA;color:#004D40}
.c-6{background:#FCE4EC;color:#880E4F}
.c-7{background:#F1F8E9;color:#33691E}
.c-8{background:#EDE7F6;color:#311B92}
.c-9{background:#FFF3E0;color:#E65100}
@media(max-width:600px){.grid{grid-template-columns:1fr}.hdr{padding:12px 16px}.body{padding:12px 16px}}
</style>
</head>

var ITEMS = ITEMS_DATA;

function ar(n){return n.toString().replace(/\d/g,function(d){return"٠١٢٣٤٥٦٧٨٩"[d];});}

var catsEl = document.getElementById("cats");
CATS.forEach(function(cat){
  var btn = document.createElement("button");
  btn.className = "cat-btn" + (cat==="الكل"?" active":"");
  btn.textContent = cat;
  btn.onclick = function(){
    activeCat = cat;
    document.querySelectorAll(".cat-btn").forEach(function(b){b.classList.remove("active");});
    btn.classList.add("active");
    doSearch();
  };
  catsEl.appendChild(btn);
});

document.getElementById("total-count").textContent = ar(ITEMS.length) + " صنف";

function highlight(text, q){
  if(!q) return text;
  var re = new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")", "gi");
  return text.replace(re, "<span class='highlight'>$1</span>");
}

function doSearch(){
  var q = document.getElementById("search").value.trim();
  document.getElementById("clear-btn").style.display = q ? "block" : "none";
  var filtered = ITEMS.filter(function(it){
    var matchCat = activeCat==="الكل" || it.category===activeCat;
    if(!matchCat) return false;
    if(!q) return true;
    return (it.name||"").toLowerCase().indexOf(q.toLowerCase())!==-1
        || (it.ingredients||"").toLowerCase().indexOf(q.toLowerCase())!==-1
        || (it.sides||"").toLowerCase().indexOf(q.toLowerCase())!==-1;
  });
  render(filtered, q);
}

function clearSearch(){
  document.getElementById("search").value="";
  document.getElementById("clear-btn").style.display="none";
  doSearch();
}

function render(list, q){
  var grid = document.getElementById("grid");
  var rc = document.getElementById("result-count");
  rc.textContent = q||activeCat!=="الكل" ? ar(list.length)+" نتيجة" : "";
  if(!list.length){
    grid.innerHTML="<div class='empty'><div class='empty-i'>&#x1F50D;</div><div class='empty-t'>لا توجد نتائج — جرّب كلمة أخرى</div></div>";
    return;
  }
  grid.innerHTML = list.map(function(it){
    var cc = CAT_COLORS[it.category]||"c-0";
    var nm = highlight(it.name||"", q);
    var ing = highlight(it.ingredients||"—", q);
    var sid = highlight(it.sides||"—", q);
    var hasWeightOpts = it.weight_options===true;
    var priceDisplay = it.price && it.price!=="" ? it.price : "السعر غير محدد";
    var priceCls = it.price && it.price!=="" ? "price-badge" : "price-badge empty";

    var kgHTML = "";
    if(hasWeightOpts){
      var p1 = it.price_1kg && it.price_1kg!=="" ? it.price_1kg : "—";
      var pH = it.price_half_kg && it.price_half_kg!=="" ? it.price_half_kg : "للتعبئة اليدوية";
      kgHTML = "<div class='kg-section'>"
        +"<div class='kg-box'><div class='kg-lbl'>⚖️ كغم كامل</div><div class='kg-val"+(p1==="—"?" empty":"")+"'>"+p1+"</div></div>"
        +"<div class='kg-box'><div class='kg-lbl'>⚖️ نصف كغم</div><div class='kg-val"+(pH==="للتعبئة اليدوية"?" empty":"")+"'>"+pH+"</div></div>"

    }

      +"<div class='card-top'>"
      +"<div>"
      +"<span class='cat-tag "+cc+"'>"+it.category+"</span>"
      +"<div class='card-name'>"+nm+"</div>"
      +"</div>"
      +(hasWeightOpts ? "" : "<span class='"+priceCls+"'>"+priceDisplay+"</span>")
      +"</div>"
      +"<div class='card-body'>"
      +(hasWeightOpts ? kgHTML : "")
      +"<div class='section'><div class='section-label'>&#x1F9C0; المكونات والوصف</div><div class='section-text'>"+ing+"</div></div>"
      +(it.sides&&it.sides!=="—"&&it.sides!=="nan"?"<div class='section'><div class='section-label'>&#x1F37D;&#xFE0F; مقبلات اختيارية</div><div class='section-text'>"+sid+"</div></div>":"")
      +(it.upsell?"<div class='upsell-section'><div class='upsell-label'>&#x1F4B0; اقتراح البيع</div><div class='upsell-text'>"+it.upsell+"</div></div>":"")
      +"</div></div>";
  }).join("");
}

doSearch();
</script>
